name: CI — Lint & Build Check

on:
  pull_request:
    branches: [main]

jobs:
  check-api:
    name: API Type Check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: afia-api

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: afia-api/package-lock.json
      - run: npm ci
      - run: npx tsc --noEmit

  check-web:
    name: Frontend Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: afia-web

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: afia-web/package-lock.json
      - run: npm ci
      - run: npm run lint
      - run: npx tsc -b
      - name: Build (dry-run)
        run: npm run build
        env:
          VITE_SUPABASE_URL: https://placeholder.supabase.co
          VITE_SUPABASE_ANON_KEY: placeholder-for-ci
          VITE_API_URL: https://placeholder-api.workers.dev
          VITE_PAYSTACK_PUBLIC_KEY: pk_test_placeholder
